<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Owner - ZFloryn-Z</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #1e1e2e;
      --purple: #8c50ff;
      --purple2: #b47cff;
      --cyan: #00eaff;
      --text: #e8e8f0;
      --sub: #888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

    #curtain { position: fixed; inset: 0; background: var(--bg); z-index: 9999; pointer-events: none; transition: opacity .35s; opacity: 0; }
    #curtain.ci { opacity: 1; pointer-events: all; }

    .owner-topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; height: 56px;
    }
    .owner-back { width: 36px; height: 36px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; font-size: 14px; transition: background .2s; }
    .owner-back:hover { background: var(--border); }
    .owner-topbar-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; background: linear-gradient(90deg,var(--purple),var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .owner-page { padding: 20px 16px 100px; max-width: 520px; margin: 0 auto; }

    .owner-hero {
      background: linear-gradient(135deg, #1a0a2e 0%, #0d1a2e 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px 28px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      position: relative; overflow: hidden; margin-bottom: 20px;
    }
    .owner-hero::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(140,80,255,.15), transparent 70%);
    }
    .owner-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      border: 3px solid var(--purple);
      box-shadow: 0 0 24px rgba(140,80,255,.4);
      object-fit: cover; margin-bottom: 14px;
    }
    .owner-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 1px; background: linear-gradient(90deg,var(--purple2),var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .owner-role { color: var(--sub); font-size: 13px; margin-top: 4px; font-family: 'Space Mono', monospace; }
    .owner-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; background: rgba(140,80,255,.15); border: 1px solid rgba(140,80,255,.3); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: var(--purple2); font-weight: 600; }

    .section-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--purple); margin-bottom: 12px; }

    .socmed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .socmed-link {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px;
      text-decoration: none; color: var(--text);
      transition: border-color .2s, background .2s, transform .15s;
    }
    .socmed-link:hover { border-color: var(--sm-color, var(--purple)); background: rgba(255,255,255,.03); transform: translateY(-2px); }
    .socmed-link i { font-size: 20px; color: var(--sm-color, var(--purple)); width: 22px; flex-shrink: 0; }
    .socmed-label strong { display: block; font-size: 13px; font-weight: 700; line-height: 1.3; }
    .socmed-label { font-size: 11px; color: var(--sub); line-height: 1.4; }

    .donasi-card {
      background: linear-gradient(135deg, #1a1228 0%, #0d1520 100%);
      border: 1px solid rgba(140,80,255,.25);
      border-radius: 18px; padding: 22px 20px;
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
    }
    .donasi-card > i { font-size: 28px; color: #ff4fa3; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:.8} }
    .donasi-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: .5px; }
    .donasi-sub { font-size: 12px; color: var(--sub); }
    .donasi-info { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; width: 100%; margin-top: 6px; }
    .donasi-method { font-size: 12px; color: var(--sub); margin-bottom: 2px; }
    .donasi-number { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--cyan); letter-spacing: 1px; }
    .donasi-copy { margin-top: 8px; background: rgba(140,80,255,.2); border: 1px solid rgba(140,80,255,.3); border-radius: 8px; color: var(--purple2); font-size: 12px; font-weight: 600; padding: 6px 16px; cursor: pointer; transition: background .2s; }
    .donasi-copy:hover { background: rgba(140,80,255,.35); }
  </style>
</head>
